<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Plan</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <div id="menu"></div>
    <main class="page-card home-page">
        <h2>Meal Plan</h2>
        <p>Generate a random set of meals from your saved recipes or search history.</p>

        <fieldset class="mealplan-source" aria-label="Meal plan source">
            <legend class="sr-only">Meal plan source</legend>
            <label class="mealplan-source__option">
                <input type="radio" name="mealPlanSource" value="saved" checked />
                Saved recipes
            </label>
            <label class="mealplan-source__option">
                <input type="radio" name="mealPlanSource" value="history" />
                Search history
            </label>
        </fieldset>

        <form id="mealPlanForm" class="recipe-search" autocomplete="off">
            <label for="mealPlanCount" class="sr-only">Number of meals</label>
            <input id="mealPlanCount" type="number" min="1" max="50" step="1" inputmode="numeric" placeholder="Meals to generate" value="7" required />
            <button id="generateMealPlanButton" type="submit" class="login-btn recipe-search__button">Generate</button>
        </form>

        <p id="searchStatus" class="search-status" aria-live="polite"></p>

        <section id="recipeResults" class="recipe-results hidden" aria-live="polite">
            <aside class="recipe-list-pane">
                <h3>Meals</h3>
                <ul id="recipeList" class="recipe-list"></ul>
            </aside>
            <article id="recipeDetail" class="recipe-detail"></article>
        </section>
    </main>

    <script src="./script/nav.js"></script>
    <script src="./script/script.js"></script>
    <script src="./script/mealPlan.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommended Meal Plan</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <div id="menu"></div>
    <main class="page-card">
    <div class="mealplan-header">
      <div>
        <h2>Recommended Meal Plan</h2>
        <p>
          Recipes suggested from your recent protein searches.
        </p>
      </div>

      <button id="refreshMealPlanBtn" class="login-btn mealplan-btn">
        Refresh Suggestions
      </button>
    </div>

    <p id="mealPlanMessage" class="message"></p>

    <section id="mealPlanSummary" class="mealplan-summary hidden">
      <h3>Your weekly suggestions</h3>
      <p id="mealPlanSummaryText"></p>
    </section>

    <section id="mealPlanGrid" class="mealplan-grid">
      <!-- cards will render here -->
    </section>
  </main>

  <script src="./script/nav.js"></script>
  <script src="./script/script.js"></script>
  <script src="./script/mealPlan.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <section class="page-card auth-card">
        <a href="index.html" class="back-arrow">←</a>

        <div class="auth-header">
            <p class="auth-label">Welcome</p>
            <h2 id="authTitle">Login to Your Account</h2>
            <p class="auth-subtitle" id="authSubtitle">
                Enter your email and password to continue.
            </p>
        </div>

        <form id="authForm" class="login-form">

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <p id="authMessage" class="message"></p>

            <button type="submit" id="authButton" class="login-btn">
                Login
            </button>

            <div class="auth-footer">
                <span id="switchText">Don't have an account?</span>
                <a href="#" id="switchLink" class="signup-link">Sign Up</a>
            </div>

        </form>

        <form id="confirmForm" class="login-form hidden">

            <div class="form-group">
                <label for="code">Confirmation Code</label>
                <input type="text" id="code" placeholder="Enter verification code" required>
            </div>

            <p id="confirmMessage" class="message"></p>

            <button type="submit" class="login-btn">
                Confirm Code
            </button>

        </form>

    </section>
    <script src="./script/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.15/dist/amazon-cognito-identity.min.js"></script>
    <script src="./script/auth.js"></script>
</body>

</html>

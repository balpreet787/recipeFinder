<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Recipes</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <div id="menu"></div>
    <main class="page-card home-page">
        <h2>Saved Recipes</h2>
        <p>Everything you bookmarked lives here, ready for the next time you need a reliable favorite.</p>

        <p id="searchStatus" class="search-status" aria-live="polite"></p>

        <section id="recipeResults" class="recipe-results hidden" aria-live="polite">
            <aside class="recipe-list-pane">
                <h3>Recipes</h3>
                <ul id="recipeList" class="recipe-list"></ul>
            </aside>
            <article id="recipeDetail" class="recipe-detail"></article>
        </section>
    </main>
    <script src="./script/nav.js"></script>
    <script src="./script/script.js"></script>
</body>
</html>
